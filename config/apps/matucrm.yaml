# MatuCrm — CRM comercial MatuByte
id: matucrm
name: MatuCrm
apiKey: pk_matucrm_prod_cambiar
enabled: true

returnUrls:
  development: http://localhost:5175/registro/pago-resultado
  production: https://crm.matubyte.com/registro/pago-resultado

imageUrl: https://pay.matubyte.com/MatuCRM.png

paymentMethods:
  - CREDIT_CARD
  - PSE
  - NEQUI
  - DAVIPLATA

convertUsdToCop: false

catalog:
  - id: plan-mensual
    name: MatuCrm Mensual
    description: Suscripción mensual — CRM completo para tu equipo comercial
    amount: 30000
    currency: COP

  - id: plan-semestral
    name: MatuCrm Semestral
    description: 6 meses con 10% de descuento
    amount: 162000
    currency: COP

  - id: plan-anual
    name: MatuCrm Anual
    description: 12 meses con 20% de descuento
    amount: 288000
    currency: COP
