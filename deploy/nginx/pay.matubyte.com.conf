# pay.matubyte.com — PayMatuByte API (Bold + relay de retorno)

upstream paymatubyte_api {
    server 127.0.0.1:3020;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name pay.matubyte.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pay.matubyte.com;

    ssl_certificate /etc/letsencrypt/live/pay.matubyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pay.matubyte.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://paymatubyte_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
